# Cloud Build configuration for Cesteral MCP Servers
# Automated CI/CD pipeline: test -> build -> scan -> push -> terraform -> health checks

substitutions:
  _ENVIRONMENT: 'dev'
  _REGION: 'europe-west2'
  _ARTIFACT_REGISTRY_REPO: 'cesteral'

options:
  machineType: 'N1_HIGHCPU_8'
  substitution_option: 'ALLOW_LOOSE'
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: 'node:20-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g pnpm@8.15.0
        pnpm install --frozen-lockfile
        pnpm run build
        pnpm run typecheck
        pnpm run test
    id: 'test'

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        set -eu
        SERVICES="dbm-mcp dv360-mcp ttd-mcp gads-mcp meta-mcp linkedin-mcp tiktok-mcp cm360-mcp sa360-mcp pinterest-mcp snapchat-mcp amazon-dsp-mcp msads-mcp"
        for SERVICE in $SERVICES; do
          docker build \
            -t "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/${SERVICE}:${SHORT_SHA}" \
            -t "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/${SERVICE}:${_ENVIRONMENT}-latest" \
            --build-arg "SERVER_NAME=${SERVICE}" \
            -f Dockerfile . &
        done
        wait
    id: 'build-images'
    waitFor: ['test']

  - name: 'aquasecurity/trivy:0.55.2'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        set -eu
        SERVICES="dbm-mcp dv360-mcp ttd-mcp gads-mcp meta-mcp linkedin-mcp tiktok-mcp cm360-mcp sa360-mcp pinterest-mcp snapchat-mcp amazon-dsp-mcp msads-mcp"
        for SERVICE in $SERVICES; do
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --no-progress \
            --ignore-unfixed \
            "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/${SERVICE}:${SHORT_SHA}" &
        done
        wait
    id: 'vulnerability-scan'
    waitFor: ['build-images']

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        set -eu
        SERVICES="dbm-mcp dv360-mcp ttd-mcp gads-mcp meta-mcp linkedin-mcp tiktok-mcp cm360-mcp sa360-mcp pinterest-mcp snapchat-mcp amazon-dsp-mcp msads-mcp"
        for SERVICE in $SERVICES; do
          docker push --all-tags "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/${SERVICE}" &
        done
        wait
    id: 'push-images'
    waitFor: ['vulnerability-scan']

  - name: 'hashicorp/terraform:1.9'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd terraform
        terraform init -backend-config=backend-${_ENVIRONMENT}.conf -reconfigure
    id: 'terraform-init'
    waitFor: ['push-images']

  - name: 'hashicorp/terraform:1.9'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd terraform
        terraform validate
    id: 'terraform-validate'
    waitFor: ['terraform-init']

  - name: 'ghcr.io/terraform-linters/tflint:v0.53.0'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd terraform
        tflint --init
        tflint --recursive --minimum-failure-severity=error
    id: 'tflint'
    waitFor: ['terraform-init']

  - name: 'hashicorp/terraform:1.9'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd terraform
        terraform plan \
          -var="dbm_mcp_image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/dbm-mcp:${SHORT_SHA}" \
          -var="dv360_mcp_image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/dv360-mcp:${SHORT_SHA}" \
          -var="ttd_mcp_image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/ttd-mcp:${SHORT_SHA}" \
          -var="gads_mcp_image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/gads-mcp:${SHORT_SHA}" \
          -var="meta_mcp_image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/meta-mcp:${SHORT_SHA}" \
          -var="linkedin_mcp_image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/linkedin-mcp:${SHORT_SHA}" \
          -var="tiktok_mcp_image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/tiktok-mcp:${SHORT_SHA}" \
          -var="cm360_mcp_image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/cm360-mcp:${SHORT_SHA}" \
          -var="sa360_mcp_image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/sa360-mcp:${SHORT_SHA}" \
          -var="pinterest_mcp_image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/pinterest-mcp:${SHORT_SHA}" \
          -var="snapchat_mcp_image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/snapchat-mcp:${SHORT_SHA}" \
          -var="amazon_dsp_mcp_image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/amazon-dsp-mcp:${SHORT_SHA}" \
          -var="msads_mcp_image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/msads-mcp:${SHORT_SHA}" \
          -var-file=${_ENVIRONMENT}.tfvars \
          -out=tfplan
    id: 'terraform-plan'
    waitFor: ['terraform-validate', 'tflint']

  # IMPORTANT: For production triggers, enable Cloud Build approval gates
  # to require manual review before terraform-apply runs.
  # See: https://cloud.google.com/build/docs/securing-builds/gate-builds-on-approval
  - name: 'hashicorp/terraform:1.9'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd terraform
        terraform apply -auto-approve tfplan
    id: 'terraform-apply'
    waitFor: ['terraform-plan']

  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        FAILED_SERVICES=""
        SERVICES="dbm-mcp dv360-mcp ttd-mcp gads-mcp meta-mcp linkedin-mcp tiktok-mcp cm360-mcp sa360-mcp pinterest-mcp snapchat-mcp amazon-dsp-mcp msads-mcp"
        for SERVICE in $SERVICES; do
          HEALTHY=false
          URL=$(gcloud run services describe "$SERVICE" \
            --region="${_REGION}" \
            --format='value(status.url)' 2>/dev/null || echo "")
          if [ -z "$URL" ]; then
            echo "WARNING: Service $SERVICE not found, skipping"
            continue
          fi
          for i in $(seq 1 24); do
            if curl -s -o /dev/null -w "%{http_code}" "$URL/health" | grep -q "200"; then
              HEALTHY=true
              break
            fi
            sleep 5
          done
          if [ "$HEALTHY" != "true" ]; then
            FAILED_SERVICES="$FAILED_SERVICES $SERVICE"
            PREV_REVISION=$(gcloud run revisions list \
              --service="$SERVICE" \
              --region="${_REGION}" \
              --sort-by='~creationTimestamp' \
              --format='value(metadata.name)' \
              --limit=2 | tail -n1)
            if [ -n "$PREV_REVISION" ]; then
              gcloud run services update-traffic "$SERVICE" \
                --region="${_REGION}" \
                --to-revisions="${PREV_REVISION}=100"
            fi
          fi
        done
        if [ -n "$FAILED_SERVICES" ]; then
          echo "DEPLOYMENT FAILED — rolled back:$FAILED_SERVICES"
          exit 1
        fi
    id: 'health-check'
    waitFor: ['terraform-apply']

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/dbm-mcp:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/dbm-mcp:${_ENVIRONMENT}-latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/dv360-mcp:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/dv360-mcp:${_ENVIRONMENT}-latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/ttd-mcp:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/ttd-mcp:${_ENVIRONMENT}-latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/gads-mcp:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/gads-mcp:${_ENVIRONMENT}-latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/meta-mcp:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/meta-mcp:${_ENVIRONMENT}-latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/linkedin-mcp:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/linkedin-mcp:${_ENVIRONMENT}-latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/tiktok-mcp:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/tiktok-mcp:${_ENVIRONMENT}-latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/cm360-mcp:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/cm360-mcp:${_ENVIRONMENT}-latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/sa360-mcp:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/sa360-mcp:${_ENVIRONMENT}-latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/pinterest-mcp:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/pinterest-mcp:${_ENVIRONMENT}-latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/snapchat-mcp:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/snapchat-mcp:${_ENVIRONMENT}-latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/amazon-dsp-mcp:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/amazon-dsp-mcp:${_ENVIRONMENT}-latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/msads-mcp:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/msads-mcp:${_ENVIRONMENT}-latest'

artifacts:
  objects:
    location: 'gs://${PROJECT_ID}-build-artifacts/${_ENVIRONMENT}/${BUILD_ID}'
    paths:
      - 'terraform/tfplan'

timeout: '2400s'
