# Cloud Build configuration for Cesteral MCP Servers
# Automated CI/CD pipeline: Build Docker images → Push to registry → Deploy to Cloud Run
# Builds dbm-mcp, dv360-mcp, ttd-mcp, gads-mcp, meta-mcp, linkedin-mcp, and tiktok-mcp servers from the same monorepo.
#
# IMPORTANT: For production deployments, configure the Cloud Build trigger with
# "Require approval before build executes" enabled. This ensures human review
# before any production changes are applied.

substitutions:
  _ENVIRONMENT: 'dev' # Override with trigger substitution variable
  _REGION: 'europe-west2'
  _ARTIFACT_REGISTRY_REPO: 'cesteral'

options:
  machineType: 'N1_HIGHCPU_8'
  substitution_option: 'ALLOW_LOOSE'
  logging: CLOUD_LOGGING_ONLY

steps:
  # Step 1: Install dependencies and run tests
  - name: 'node:20-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g pnpm@8.15.0
        pnpm install --frozen-lockfile
        pnpm run build
        pnpm run typecheck
        pnpm run test
    id: 'test'

  # Step 2a: Build dbm-mcp Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/dbm-mcp:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/dbm-mcp:${_ENVIRONMENT}-latest'
      - '--build-arg'
      - 'SERVER_NAME=dbm-mcp'
      - '-f'
      - 'Dockerfile'
      - '.'
    id: 'build-dbm-mcp'
    waitFor: ['test']

  # Step 2b: Build dv360-mcp Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/dv360-mcp:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/dv360-mcp:${_ENVIRONMENT}-latest'
      - '--build-arg'
      - 'SERVER_NAME=dv360-mcp'
      - '-f'
      - 'Dockerfile'
      - '.'
    id: 'build-dv360-mcp'
    waitFor: ['test']

  # Step 2c: Build ttd-mcp Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/ttd-mcp:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/ttd-mcp:${_ENVIRONMENT}-latest'
      - '--build-arg'
      - 'SERVER_NAME=ttd-mcp'
      - '-f'
      - 'Dockerfile'
      - '.'
    id: 'build-ttd-mcp'
    waitFor: ['test']

  # Step 2d: Build gads-mcp Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/gads-mcp:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/gads-mcp:${_ENVIRONMENT}-latest'
      - '--build-arg'
      - 'SERVER_NAME=gads-mcp'
      - '-f'
      - 'Dockerfile'
      - '.'
    id: 'build-gads-mcp'
    waitFor: ['test']

  # Step 2e: Build meta-mcp Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/meta-mcp:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/meta-mcp:${_ENVIRONMENT}-latest'
      - '--build-arg'
      - 'SERVER_NAME=meta-mcp'
      - '-f'
      - 'Dockerfile'
      - '.'
    id: 'build-meta-mcp'
    waitFor: ['test']

  # Step 2f: Build linkedin-mcp Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/linkedin-mcp:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/linkedin-mcp:${_ENVIRONMENT}-latest'
      - '--build-arg'
      - 'SERVER_NAME=linkedin-mcp'
      - '-f'
      - 'Dockerfile'
      - '.'
    id: 'build-linkedin-mcp'
    waitFor: ['test']

  # Step 2g: Build tiktok-mcp Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/tiktok-mcp:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/tiktok-mcp:${_ENVIRONMENT}-latest'
      - '--build-arg'
      - 'SERVER_NAME=tiktok-mcp'
      - '-f'
      - 'Dockerfile'
      - '.'
    id: 'build-tiktok-mcp'
    waitFor: ['test']

  # Step 2h: Scan all images for vulnerabilities
  - name: 'aquasecurity/trivy:0.55.2'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        for SERVICE in dbm-mcp dv360-mcp ttd-mcp gads-mcp meta-mcp linkedin-mcp tiktok-mcp; do
          echo "Scanning $SERVICE..."
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --no-progress \
            --ignore-unfixed \
            "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/$SERVICE:${SHORT_SHA}"
        done
    id: 'vulnerability-scan'
    waitFor: ['build-dbm-mcp', 'build-dv360-mcp', 'build-ttd-mcp', 'build-gads-mcp', 'build-meta-mcp', 'build-linkedin-mcp', 'build-tiktok-mcp']

  # Step 3a: Push dbm-mcp image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/dbm-mcp'
    id: 'push-dbm-mcp'
    waitFor: ['vulnerability-scan']

  # Step 3b: Push dv360-mcp image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/dv360-mcp'
    id: 'push-dv360-mcp'
    waitFor: ['vulnerability-scan']

  # Step 3c: Push ttd-mcp image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/ttd-mcp'
    id: 'push-ttd-mcp'
    waitFor: ['vulnerability-scan']

  # Step 3d: Push gads-mcp image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/gads-mcp'
    id: 'push-gads-mcp'
    waitFor: ['vulnerability-scan']

  # Step 3e: Push meta-mcp image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/meta-mcp'
    id: 'push-meta-mcp'
    waitFor: ['vulnerability-scan']

  # Step 3f: Push linkedin-mcp image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/linkedin-mcp'
    id: 'push-linkedin-mcp'
    waitFor: ['vulnerability-scan']

  # Step 3g: Push tiktok-mcp image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/tiktok-mcp'
    id: 'push-tiktok-mcp'
    waitFor: ['vulnerability-scan']

  # Step 4: Initialize Terraform
  - name: 'hashicorp/terraform:1.9'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd terraform
        terraform init -backend-config=backend-${_ENVIRONMENT}.conf -reconfigure
    id: 'terraform-init'
    waitFor: ['push-dbm-mcp', 'push-dv360-mcp', 'push-ttd-mcp', 'push-gads-mcp', 'push-meta-mcp', 'push-linkedin-mcp', 'push-tiktok-mcp']

  # Step 4b: Validate Terraform configuration
  - name: 'hashicorp/terraform:1.9'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd terraform
        terraform validate
    id: 'terraform-validate'
    waitFor: ['terraform-init']

  # Step 4c: Lint Terraform code
  - name: 'ghcr.io/terraform-linters/tflint:v0.53.0'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd terraform
        tflint --init
        tflint --recursive --minimum-failure-severity=error
    id: 'tflint'
    waitFor: ['terraform-init']

  # Step 5: Terraform Plan
  - name: 'hashicorp/terraform:1.9'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd terraform
        terraform plan \
          -var="dbm_mcp_image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/dbm-mcp:${SHORT_SHA}" \
          -var="dv360_mcp_image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/dv360-mcp:${SHORT_SHA}" \
          -var="ttd_mcp_image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/ttd-mcp:${SHORT_SHA}" \
          -var="gads_mcp_image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/gads-mcp:${SHORT_SHA}" \
          -var="meta_mcp_image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/meta-mcp:${SHORT_SHA}" \
          -var="linkedin_mcp_image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/linkedin-mcp:${SHORT_SHA}" \
          -var="tiktok_mcp_image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/tiktok-mcp:${SHORT_SHA}" \
          -var-file=${_ENVIRONMENT}.tfvars \
          -out=tfplan
    id: 'terraform-plan'
    waitFor: ['terraform-validate', 'tflint']

  # Step 6: Terraform Apply (auto-approve for automated deployments)
  - name: 'hashicorp/terraform:1.9'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd terraform
        terraform apply -auto-approve tfplan
    id: 'terraform-apply'
    waitFor: ['terraform-plan']

  # Step 7: Health checks with automatic rollback
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        FAILED_SERVICES=""
        for SERVICE in dbm-mcp dv360-mcp ttd-mcp gads-mcp meta-mcp linkedin-mcp tiktok-mcp; do
          HEALTHY=false
          URL=$(gcloud run services describe $SERVICE \
            --region=${_REGION} \
            --format='value(status.url)' 2>/dev/null || echo "")
          if [ -z "$URL" ]; then
            echo "WARNING: Service $SERVICE not found, skipping"
            continue
          fi
          echo "Testing health endpoint: $URL/health"
          for i in $(seq 1 24); do
            if curl -s -o /dev/null -w "%{http_code}" "$URL/health" | grep -q "200"; then
              echo "Health check passed for $SERVICE"
              HEALTHY=true
              break
            fi
            echo "Waiting for $SERVICE to be ready... (attempt $i/24)"
            sleep 5
          done
          if [ "$HEALTHY" != "true" ]; then
            echo "Health check FAILED for $SERVICE — initiating rollback"
            FAILED_SERVICES="$FAILED_SERVICES $SERVICE"
            # Get the previous (second-latest) revision
            PREV_REVISION=$(gcloud run revisions list \
              --service=$SERVICE \
              --region=${_REGION} \
              --sort-by='~creationTimestamp' \
              --format='value(metadata.name)' \
              --limit=2 | tail -n1)
            if [ -n "$PREV_REVISION" ]; then
              echo "Rolling back $SERVICE to revision: $PREV_REVISION"
              gcloud run services update-traffic $SERVICE \
                --region=${_REGION} \
                --to-revisions=$PREV_REVISION=100
              echo "Rollback complete for $SERVICE"
            else
              echo "ERROR: No previous revision found for $SERVICE — cannot rollback"
            fi
          fi
        done
        if [ -n "$FAILED_SERVICES" ]; then
          echo "DEPLOYMENT FAILED — rolled back:$FAILED_SERVICES"
          exit 1
        fi
        echo "All health checks passed successfully"
    id: 'health-check'
    waitFor: ['terraform-apply']

# Images to be pushed to Artifact Registry
images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/dbm-mcp:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/dbm-mcp:${_ENVIRONMENT}-latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/dv360-mcp:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/dv360-mcp:${_ENVIRONMENT}-latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/ttd-mcp:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/ttd-mcp:${_ENVIRONMENT}-latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/gads-mcp:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/gads-mcp:${_ENVIRONMENT}-latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/meta-mcp:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/meta-mcp:${_ENVIRONMENT}-latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/linkedin-mcp:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/linkedin-mcp:${_ENVIRONMENT}-latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/tiktok-mcp:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/tiktok-mcp:${_ENVIRONMENT}-latest'

# Artifacts to store
artifacts:
  objects:
    location: 'gs://${PROJECT_ID}-build-artifacts/${_ENVIRONMENT}/${BUILD_ID}'
    paths:
      - 'terraform/tfplan'

# Timeout for entire build
timeout: '1800s' # 30 minutes
