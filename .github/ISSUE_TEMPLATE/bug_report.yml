name: Bug Report
description: Report a bug in a Cesteral MCP server
labels: ["bug"]
body:
  - type: dropdown
    id: server
    attributes:
      label: Server
      description: Which server is affected?
      options:
        - dbm-mcp
        - dv360-mcp
        - ttd-mcp
        - gads-mcp
        - meta-mcp
        - linkedin-mcp
        - tiktok-mcp
        - cm360-mcp
        - sa360-mcp
        - pinterest-mcp
        - snapchat-mcp
        - amazon-dsp-mcp
        - msads-mcp
        - shared
        - Not server-specific
    validations:
      required: true

  - type: dropdown
    id: transport
    attributes:
      label: Transport Mode
      description: Which transport mode are you using?
      options:
        - streamable-http
        - stdio
    validations:
      required: true

  - type: dropdown
    id: auth-mode
    attributes:
      label: Auth Mode
      description: Which authentication mode are you using?
      options:
        - google-headers
        - jwt
        - none
        - ttd-headers
        - meta-bearer
        - linkedin-bearer
        - tiktok-bearer
        - sa360-headers
        - pinterest-bearer
        - snapchat-bearer
        - amazon-dsp-bearer
        - msads-bearer
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Start the server with...
        2. Send a request to...
        3. Observe that...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Environment details (optional).
      placeholder: |
        Node.js version:
        OS:
        pnpm version:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output (optional).
      render: shell
    validations:
      required: false
