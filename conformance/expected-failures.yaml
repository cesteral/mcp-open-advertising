# Expected conformance test failures for Cesteral MCP servers.
# These scenarios require specific tool/resource behaviors that our
# business-domain servers don't expose (e.g., returning audio content,
# binary resources, or sampling support).
#
# Format: use "server:" key as the root (required by @modelcontextprotocol/conformance).
# As new capabilities are added, scenarios should be removed from this list.

server:
  # Content type scenarios — our tools return text/JSON only
  - tools-call-image
  - tools-call-audio
  - tools-call-embedded-resource
  - tools-call-mixed-content

  # Progress tokens — not currently implemented
  - tools-call-with-progress

  # Sampling — servers don't request LLM completions from clients
  - tools-call-sampling

  # Elicitation — requires interactive user input; our servers don't elicit
  - tools-call-elicitation
  - elicitation-sep1034-defaults
  - elicitation-sep1330-enums

  # Resource subscriptions — not implemented (polling is sufficient)
  - resources-subscribe
  - resources-unsubscribe

  # Binary resources — all resources are text/JSON
  - resources-read-binary

  # Completion — not implemented
  - completion-complete

  # SSE scenarios — we use Streamable HTTP, not SSE polling
  - server-sse-polling

  # JSON Schema 2020-12 — our tools use Zod-generated JSON Schema (draft-07)
  - json-schema-2020-12

  # DNS rebinding — tested separately via our own security tests
  - dns-rebinding-protection

  # Prompts returning embedded resources or images — our prompts return text only
  - prompts-get-embedded-resource
  - prompts-get-with-image

  # Test fixture scenarios — require specific resource URIs / prompt names not yet registered
  # TODO: add test://static-text resource, test://template/{id}/data template,
  #       test_simple_prompt and test_prompt_with_arguments prompts to shared conformance fixtures
  - resources-read-text
  - resources-templates-read
  - prompts-get-simple
  - prompts-get-with-args

  # Logging notifications — sendLoggingMessage requires client to call logging/setLevel first;
  # conformance scenario doesn't set level before calling tool so notifications are filtered
  - tools-call-with-logging
